<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>레이 · 이번 주 대시보드</title>

<!-- 홈 화면 앱 설정 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0a9c8">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<!-- iOS -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="로드맵">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --paper:#eef0f8;--surface:#ffffff;--ink:#2c303c;--ink-soft:#5a5f70;--ink-faint:#8b90a2;--line:#dde0ec;
    --adsp:#9fb0e8;--hanneung:#f0a9c8;--korean:#a6cef0;--opic:#aacef2;--office:#b4bef0;--jlpt:#c3a8e2;--study:#e7abcf;--python:#a9d0ef;--sqld:#b8a4e0;--rest:#eeb2d2;
    --display:'Space Grotesk','Pretendard Variable',sans-serif;
    --body:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;padding:calc(22px + env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom));}
  .wrap{max-width:560px;margin:0 auto;}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .top .k{font-family:var(--display);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}
  .top .dt{font-family:var(--display);font-size:12px;color:var(--ink-soft);font-weight:500;}

  /* HERO — this week */
  .hero{background:linear-gradient(145deg,#7e8ac9,#6673bb);color:#fff;border-radius:24px;padding:24px 22px;position:relative;overflow:hidden;}
  .hero .rail{position:absolute;left:0;top:0;bottom:0;width:6px;}
  .hero .wk{font-family:var(--display);font-size:12px;letter-spacing:.06em;color:#e4e6f5;font-weight:600;margin-bottom:8px;}
  .hero h1{font-size:26px;line-height:1.2;font-weight:700;letter-spacing:-.01em;margin-bottom:18px;}
  .hero .list{display:grid;gap:9px;}
  .hero .li{display:grid;grid-template-columns:56px 1fr;gap:12px;font-size:14.5px;align-items:baseline;}
  .hero .li .k2{font-family:var(--display);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#e4e6f5;padding-top:2px;}
  .hero .li .v{color:#eef0f6;}
  .hero .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
  .hero .tag{font-size:11px;font-weight:700;border-radius:20px;padding:3px 11px;color:#39364f;}

  /* next exam */
  .exam-card{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
  .exam-card .cd{font-family:var(--display);font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1;}
  .exam-card .info .l{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);}
  .exam-card .info .n{font-size:16px;font-weight:700;margin-top:2px;}
  .exam-card .info .d{font-family:var(--display);font-size:12px;color:var(--ink-soft);}

  /* always-on */
  .habits{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .habit{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 13px;display:flex;gap:9px;align-items:center;font-size:12.5px;font-weight:500;color:var(--ink-soft);}
  .habit .d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .habit b{color:var(--ink);font-weight:600;}

  /* mini calendar grid */
  .mini{margin-top:26px;}
  .mini .h{font-family:var(--display);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .mini .h::after{content:"";flex:1;height:1px;background:var(--line);}
  .mrow{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;margin-bottom:7px;}
  .mrow .ml{font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink-soft);text-align:right;}
  .cells{display:flex;gap:5px;}
  .cell{flex:0 0 44px;height:44px;border-radius:14px;position:relative;background:linear-gradient(160deg,rgba(255,255,255,.55),rgba(255,255,255,0) 62%),var(--c,#d4d8e2);cursor:default;box-shadow:0 3px 9px rgba(150,162,210,.22),inset 0 1px 2px rgba(255,255,255,.7);transition:transform .16s,box-shadow .16s;}
  .cell.dim{opacity:.35;}
  .cell.now{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--ink),0 2px 8px rgba(40,50,45,.18);z-index:2;}
  .cell .ex{position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--jlpt);}
  .cell .pct{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:.01em;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(30,34,55,.35);}
  .cell .pct.low{color:rgba(60,64,80,.68);text-shadow:none;}
  .cell .wn{position:absolute;inset:0;border-radius:7px;border:2px dashed #b06a1e;}
  .cell .tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;line-height:1.35;font-weight:500;padding:7px 10px;border-radius:9px;width:150px;z-index:5;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .cell .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);}
  .cell:hover .tip{display:block;}

  .legend{display:flex;flex-wrap:wrap;gap:6px 13px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);font-weight:500;}
  .lg .sw{width:11px;height:11px;border-radius:3px;}

  .cell[data-w]{cursor:pointer;}
  .cell[data-w]:hover{transform:translateY(-2px);box-shadow:0 7px 15px rgba(150,162,210,.32),inset 0 1px 2px rgba(255,255,255,.8);}
  .cell.sel{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--hanneung),0 2px 8px rgba(40,50,45,.18);z-index:3;}

  .day-panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .35s;}
  .day-panel.open{max-height:2000px;opacity:1;margin-top:18px;}
  .dp-head{font-family:var(--display);font-size:12.5px;letter-spacing:.03em;font-weight:600;color:var(--ink-soft);padding-bottom:10px;margin-bottom:4px;border-bottom:1px solid var(--line);}
  .dp-head b{color:var(--ink);}
  .dp-close{float:right;cursor:pointer;color:var(--ink-faint);font-size:15px;line-height:1;}
  .day{display:grid;grid-template-columns:44px 1fr;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .day:last-child{border-bottom:none;}
  .day.today{background:linear-gradient(90deg,rgba(120,138,201,.10),transparent);border-radius:10px;}
  .day.past{opacity:.58;}
  .day .dd{text-align:center;padding-top:4px;}
  .day .dd .dw{font-family:var(--display);font-size:11px;font-weight:600;color:var(--ink-faint);}
  .day .dd .dn{font-family:var(--display);font-size:19px;font-weight:700;color:var(--ink);line-height:1.05;}
  .day .dd .dprog{font-family:var(--display);font-size:10px;font-weight:700;color:var(--ink-faint);margin-top:3px;background:var(--line);border-radius:20px;padding:1px 0;}
  .day .dd .dprog.full{background:var(--opic);color:#5a4415;}
  .day.wknd .dd .dn{color:var(--hanneung);}
  .day.today .dd .dw{color:var(--ink);}
  .day .items{display:flex;flex-direction:column;gap:5px;}
  .day .it{display:grid;grid-template-columns:17px 74px 1fr;gap:9px;align-items:center;font-size:12.5px;background:#f4f5fa;border-left:3px solid var(--rest);border-radius:6px;padding:6px 10px;cursor:pointer;}
  .day .it .ibox{width:16px;height:16px;border-radius:5px;border:2px solid var(--line);background:#fff;position:relative;transition:.15s;}
  .day .it.done .ibox{background:var(--opic);border-color:var(--opic);}
  .day .it.done .ibox::after{content:'✓';position:absolute;top:-4px;left:1px;font-size:12px;color:#fff;font-weight:700;}
  .day .it .tm{font-family:var(--display);font-size:10.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.01em;}
  .day .it .tx{color:var(--ink);font-weight:500;}
  .day .it.done .tx{color:var(--ink-faint);text-decoration:line-through;}
  .day .it.exam{border:none!important;}
  .day .it.exam .tm,.day .it.exam .tx{color:#fff;font-weight:700;}
  .day .it.exam .ibox{border-color:rgba(255,255,255,.7);background:transparent;}
  .day .it.exam.done .ibox{background:#fff;}
  .day .it.exam.done .ibox::after{color:var(--opic);}

  .goal-box{border-radius:13px;padding:13px 15px;margin:16px 0 4px;}
  .hero .goal-box{background:rgba(255,255,255,.10);}
  .goal-label{font-family:var(--display);font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:9px;}
  .hero .goal-label{color:#dfe1f2;}
  .goal{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;flex-wrap:wrap;line-height:1.4;}
  .goal .gi{flex-shrink:0;font-size:12.5px;}
  .goal .gt{font-weight:600;}
  .hero .goal .gt{color:#fff;}
  .goal .imp{font-size:10.5px;letter-spacing:.06em;font-weight:700;color:var(--opic);}
  .goal .due{font-size:10px;font-weight:600;padding:1.5px 8px;border-radius:20px;white-space:nowrap;}
  .hero .goal .due{background:rgba(255,255,255,.16);color:#e6e9f5;}
  .hero .goal.exam .gt{color:#ffcf9e;}
  .day-panel .goal-box{background:#f5f6f9;border:1px solid var(--line);margin:12px 0 16px;}
  .day-panel .goal-label{color:var(--ink-faint);}
  .day-panel .goal .gt{color:var(--ink);}
  .day-panel .goal .due{background:var(--ink);color:#fff;}
  .day-panel .goal.exam .gt{color:var(--jlpt);}

  /* sync badge */
  .sync{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-faint);}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:#c3c8d6;transition:.3s;}
  .sync.on .dot{background:#2e8b6b;}
  .sync.off .dot{background:#d98a52;}

  /* today todo card */
  .today-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:20px 20px 16px;margin-bottom:14px;box-shadow:0 12px 34px rgba(30,34,60,.07);}
  .tc-top{display:flex;align-items:baseline;justify-content:space-between;}
  .tc-top .tt{font-family:var(--display);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--opic);font-weight:700;}
  .tc-top .dd{font-family:var(--display);font-size:12px;color:var(--ink-faint);}
  .tc-title{font-size:19px;font-weight:700;letter-spacing:-.01em;margin:5px 0 8px;}
  .kcal-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .kcal-in{width:76px;border:1px solid var(--line);border-radius:9px;padding:6px 9px;font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink);outline:none;text-align:right;background:#fff;}
  .kcal-in:focus{border-color:var(--jlpt);}
  .kcal-unit{font-family:var(--display);font-size:12.5px;font-weight:600;color:var(--ink-faint);}
  .kcal-badge{font-size:11.5px;font-weight:700;border-radius:20px;padding:4px 12px;}
  .kcal-ai{margin-left:auto;font-size:11px;font-weight:600;text-decoration:none;color:var(--ink-soft);border:1px solid var(--line);border-radius:20px;padding:5px 11px;white-space:nowrap;background:#fff;}
  .kcal-ai:hover{border-color:var(--jlpt);color:var(--jlpt);}

  .wt-box{background:linear-gradient(140deg,#f2f4fb,#fbf3f7);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
  .wt-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .wt-in{width:84px;border:1px solid var(--line);border-radius:9px;padding:6px 9px;font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink);outline:none;text-align:right;background:#fff;}
  .wt-in:focus{border-color:var(--hanneung);}
  .wt-unit{font-family:var(--display);font-size:12.5px;font-weight:600;color:var(--ink-faint);}
  .wt-delta{font-family:var(--display);font-size:12px;font-weight:700;border-radius:20px;padding:3px 10px;}
  .wt-delta.dn{background:#d8efd9;color:#3a6f42;}
  .wt-delta.up{background:#f9dcdc;color:#a33c3c;}
  .wt-delta.same{background:#e6e8ef;color:#5a5f70;}
  .wt-trend{font-size:11px;font-weight:600;color:var(--ink-soft);margin-left:auto;}
  .wt-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px;}
  .wt-card{background:#fff;border-radius:10px;padding:8px 10px;}
  .wt-card .l{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--ink-faint);text-transform:uppercase;font-family:var(--display);}
  .wt-card .v{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink);margin-top:2px;}
  .wt-card .v small{font-size:10.5px;font-weight:600;color:var(--ink-faint);margin-left:2px;}
  .wt-bar{height:5px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:5px;}
  .wt-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--korean),var(--hanneung));border-radius:6px;transition:width .5s;}
  .wt-empty{font-size:12px;color:var(--ink-faint);margin-top:8px;}
  .tc-prog{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:6px;}
  .tc-prog span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--opic),var(--hanneung));transition:width .45s;}
  .tc-pct{font-size:11px;font-weight:600;color:var(--ink-faint);text-align:right;margin-bottom:10px;}
  .todo{display:flex;align-items:flex-start;gap:11px;padding:9px 2px;border-bottom:1px solid #eef0f6;}
  .todo:last-of-type{border-bottom:none;}
  .todo .box{width:21px;height:21px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .todo.done .box{background:var(--jlpt);border-color:var(--jlpt);}
  .todo .box svg{width:12px;height:12px;opacity:0;transition:.15s;}
  .todo.done .box svg{opacity:1;}
  .todo .tcont{flex:1;cursor:pointer;min-width:0;}
  .todo .ttm{font-family:var(--display);font-size:10.5px;font-weight:600;color:var(--ink-faint);}
  .todo .ttx{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;}
  .todo.done .ttx{color:var(--ink-faint);text-decoration:line-through;}
  .todo .del{color:var(--ink-faint);font-size:16px;padding:0 2px;opacity:.45;cursor:pointer;align-self:center;}
  .todo .del:hover{opacity:1;color:var(--hanneung);}
  .tc-empty{font-size:13.5px;color:var(--ink-faint);padding:10px 2px;line-height:1.5;}
  .tc-add{display:flex;gap:8px;margin-top:13px;}
  .tc-add input{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-family:var(--body);font-size:13px;color:var(--ink);outline:none;min-width:0;}
  .tc-add input:focus{border-color:var(--jlpt);}
  .tc-add button{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:0 16px;font-family:var(--body);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

  /* goal edit button */
  .goal-edit{float:right;font-size:10px;font-weight:600;letter-spacing:.03em;cursor:pointer;border:1px solid;border-radius:20px;padding:2px 10px;background:transparent;font-family:var(--body);}
  .hero .goal-edit{color:#c2c7e0;border-color:rgba(255,255,255,.28);}
  .day-panel .goal-edit{color:var(--ink-faint);border-color:var(--line);}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,23,40,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:100;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--paper);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:22px 20px calc(28px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.4,0,.2,1);}
  @keyframes slideup{from{transform:translateY(30px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .modal h3{font-size:17px;font-weight:700;margin-bottom:2px;}
  .modal .msub{font-size:12px;color:var(--ink-soft);margin-bottom:16px;}
  .gedit{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px;}
  .gedit .grow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .gedit .grow:last-child{margin-bottom:0;}
  .gedit .badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap;}
  .gedit input,.gedit select{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-family:var(--body);font-size:13px;color:var(--ink);outline:none;min-width:0;background:#fff;}
  .gedit input:focus,.gedit select:focus{border-color:var(--jlpt);}
  .gedit .del-g{color:var(--hanneung);font-size:12px;font-weight:600;cursor:pointer;padding:4px;white-space:nowrap;}
  .madd{display:flex;gap:8px;margin:14px 0;}
  .madd button{flex:1;border:1px dashed var(--ink-faint);background:transparent;border-radius:10px;padding:11px;font-family:var(--body);font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .madd button:active{background:#fff;}
  .msave{display:flex;gap:10px;margin-top:8px;}
  .msave button{flex:1;border:none;border-radius:12px;padding:13px;font-family:var(--body);font-size:14px;font-weight:700;cursor:pointer;}
  .msave .save{background:var(--ink);color:#fff;}
  .msave .cancel{background:transparent;color:var(--ink-soft);border:1px solid var(--line)!important;}

  .foot{margin-top:20px;font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><span class="k">This Week · 레이 대시보드</span><span class="sync off" id="sync"><span class="dot"></span><span id="syncTxt">로컬 모드</span></span></div>

  <div class="today-card" id="todayCard"></div>

  <div class="hero" id="hero"></div>
  <div class="exam-card" id="examCard"></div>

  <div class="habits">
    <div class="habit"><span class="d" style="background:var(--rest)"></span><span><b>공고</b> 일 밤 1건</span></div>
    <div class="habit"><span class="d" style="background:var(--jlpt)"></span><span><b>JLPT 단어</b> 매일 15분</span></div>
    <div class="habit"><span class="d" style="background:var(--opic)"></span><span><b>운동</b> 주 3~4회</span></div>
    <div class="habit"><span class="d" style="background:var(--korean)"></span><span><b>강점</b> 지원할 때</span></div>
  </div>

  <div class="mini">
    <div class="h">6개월 한눈에 · 주를 누르면 일별로 펼쳐져요</div>
    <div id="grid"></div>
    <div class="day-panel" id="dayPanel"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="foot">오늘 날짜 기준 이번 주가 자동으로 강조돼요 · 칸에 마우스를 올리면 그 주 요약 · <span style="border:2px solid var(--jlpt);border-radius:50%;display:inline-block;width:8px;height:8px;"></span> 시험 · <span style="color:#b06a1e">▢</span> 시험 기간</div>
</div>


  <div class="modal-overlay" id="modal"></div>

/* ================= 유틸 ================= */
function t0(){const t=new Date();t.setHours(0,0,0,0);return t;}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmt(s){const p=s.split('-');return (+p[1])+'/'+(+p[2]);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function wkStart(w){return new Date(w.s+'T00:00:00');}
function wkEnd(w){return new Date(w.e+'T23:59:59');}
function weekOf(d){return W.find(w=>d>=wkStart(w)&&d<=wkEnd(w));}
function weekProgress(w){
  let done=0,total=0;
  let d=new Date(w.s+'T00:00:00');const end=new Date(w.e+'T00:00:00');
  while(d<=end){
    const ds=iso(d);
    const items=buildDay(w,new Date(d));
    items.forEach((it,i)=>{
      total++;
      if(STATE.checks&&STATE.checks[ds+'::i'+i])done++;
    });
    d.setDate(d.getDate()+1);
  }
  return {done,total,pct:total?Math.round(done/total*100):0};
}
function deepMerge(t,s){for(const k in s){const v=s[k];if(v&&typeof v==='object'&&!Array.isArray(v)){if(!t[k]||typeof t[k]!=='object')t[k]={};deepMerge(t[k],v);}else t[k]=v;}}
const now=t0();
let cur=weekOf(now)||(now<wkStart(W[0])?W[0]:W[W.length-1]);

function getGoals(n){return (STATE.goals&&STATE.goals[n])||DEFAULT_GOALS[n]||[];}
function typeOf(g){return g.type||(g.job?'job':g.exam?'exam':'todo');}

/* ================= buildDay ================= */
function slotOf(dow){ if(dow===1||dow===3)return '20:00–21:30'; if(dow===2||dow===4||dow===5)return '낮 블록'; return '오전'; }
function buildDay(w,date){
  const ds=iso(date), dow=date.getDay(), it=[];
  const ex=EXAMS.find(x=>x.d===ds);
  if(ex){
    it.push({tm:'시험일',tx:ex.l+' 응시 🎯',exam:true,c:ex.c});
    if(DETAIL[ds]) DETAIL[ds].forEach(x=>it.push({tm:x.tm||'저녁',tx:x.tx,c:'var(--'+x.c+')'}));
    it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'});
    return it;
  }
  if(w.warn){ it.push({tm:'종일',tx:'학과 시험 공부 — 자격증은 잠시 STOP',c:'var(--study)'}); it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'}); it.push({tm:'자기 전',tx:'JLPT 단어 15분 (여유되면)',c:'var(--jlpt)'}); return it; }
  const plan=DETAIL[ds];
  if(plan) plan.forEach(x=>it.push({tm:x.tm||slotOf(dow),tx:x.tx,c:'var(--'+x.c+')'}));
  else {
    const PC='var(--'+w.t[0]+')';
    if(dow===1||dow===3) it.push({tm:slotOf(dow),tx:w.eve,c:PC});
    else if(dow===2||dow===4||dow===5) it.push({tm:slotOf(dow),tx:w.day,c:PC});
    else it.push({tm:slotOf(dow),tx:w.wk,c:PC});
  }
  if(dow===2) it.push({tm:'18:30–20:30',tx:'운동 · 유산소 + 하체',c:'var(--opic)'});
  else if(dow===4) it.push({tm:'18:30–20:30',tx:'운동 · 유산소',c:'var(--opic)'});
  else if(dow===5) it.push({tm:'18:30–20:30',tx:'운동 · 유산소 + 상체',c:'var(--opic)'});
  it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'});
  it.push({tm:'아침',tx:'몸무게 기록',c:'var(--hanneung)'});
  if(!it.some(x=>x.c==='var(--jlpt)')) it.push({tm:'자기 전',tx:'JLPT 단어 15분',c:'var(--jlpt)'});
  return it;
}

function goalHTML(n,label,edit){
  const gs=getGoals(n);
  const eb=edit?`<button class="goal-edit" data-edit="${n}">✎ 편집</button>`:'';
  let rows;
  if(!gs.length) rows=`<div class="goal"><span class="gi">•</span><span class="gt" style="opacity:.55">등록된 목표 없음 — 편집으로 추가</span></div>`;
  else rows=gs.map(g=>{
    const ty=typeOf(g);
    if(ty==='job') return `<div class="goal job"><span class="gi">📋</span><span class="gt">${esc(g.name||g.job)}</span><span class="imp">${IMP[g.imp]||''}</span><span class="due">${esc(g.due)}</span></div>`;
    if(ty==='exam') return `<div class="goal exam"><span class="gi">🎯</span><span class="gt">${esc(g.text||g.exam)}</span></div>`;
    return `<div class="goal"><span class="gi">•</span><span class="gt">${esc(g.text||g.todo)}</span></div>`;
  }).join('');
  return `<div class="goal-box"><div class="goal-label">${label}${eb}</div>${rows}</div>`;
}

function renderTodo(){
  const card=document.getElementById('todayCard');
  const wk=weekOf(now), ds=iso(now);
  const base=wk?buildDay(wk,now):[];
  const customs=(STATE.customTasks&&STATE.customTasks[ds])||[];
  const items=[...base.map((it,i)=>({key:ds+'::i'+i,tm:it.tm,tx:it.tx})),...customs.map(c=>({key:ds+'::c'+c.id,tm:'추가',tx:c.tx,cid:c.id}))];
  const doneN=items.filter(x=>STATE.checks&&STATE.checks[x.key]).length;
  const pct=items.length?Math.round(doneN/items.length*100):0;
  const rowsHtml=items.length?items.map(x=>{

    return `<div class="todo ${done?'done':''}" data-key="${x.key}">

  }).join(''):`<div class="tc-empty">오늘은 등록된 일정이 없어요.<br>아래에서 직접 추가해봐요!</div>`;

  const kcalV=(STATE.kcal&&STATE.kcal[ds])||'';
  const kst=kcalState(kcalV);
  card.innerHTML=`<div class="tc-top"><span class="tt">Today · 오늘 할 일</span><span class="dd">${dstr}</span></div>
    <div class="tc-title">${wk?esc(wk.h.replace('★','').replace('⚠','')):'오늘'}</div>

      <span class="kcal-unit">/ 1,200 kcal</span>
      ${kst?`<span class="kcal-badge" style="background:${kst.bg};color:${kst.fg}">${kst.label}</span>`:''}
      <a class="kcal-ai" href="https://claude.ai/new" target="_blank" rel="noopener">🍽 AI에게 칼로리 물어보기 ↗</a>
    </div>
    ${weightHTML()}
    <div class="tc-prog"><span style="width:${pct}%"></span></div>
    <div class="tc-pct">${doneN} / ${items.length} 완료</div>
    ${rowsHtml}
    <div class="tc-add"><input id="newTask" placeholder="할 일 직접 추가…" maxlength="60"><button data-act="add">추가</button></div>`;
  card.onclick=e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    const a=t.dataset.act;
    if(a==='check'){toggleCheck(t.closest('.todo').dataset.key);}
    else if(a==='del'){delCustom(t.dataset.cid);}
    else if(a==='add'){addCustom();}
  };
  const ki=card.querySelector('#kcalIn');
  ki.addEventListener('change',()=>saveKcal(ki.value));
  ki.addEventListener('keydown',e=>{if(e.key==='Enter'){ki.blur();}});
  const wi=card.querySelector('#wtIn');
  if(wi){wi.addEventListener('change',()=>saveWeight(wi.value));wi.addEventListener('keydown',e=>{if(e.key==='Enter'){wi.blur();}});}
  const inp=card.querySelector('#newTask');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});
}

const WT_START=67, WT_GOAL=59, WT_PACE=1;   // 시작 67kg → 목표 59kg (-8kg), 주 1kg 페이스
function wLog(){return STATE.weight||{};}
function wAt(dsx){const v=wLog()[dsx];return (v||v===0)?parseFloat(v):null;}
function wPrev(ds){ // 가장 최근의 이전 기록
  const keys=Object.keys(wLog()).filter(k=>k<ds&&wAt(k)!=null).sort();
  return keys.length?{d:keys[keys.length-1],v:wAt(keys[keys.length-1])}:null;
}
function wAvg(endDate,days){ // 최근 n일 평균
  let sum=0,cnt=0,d=new Date(endDate);
  for(let i=0;i<days;i++){const v=wAt(iso(d));if(v!=null){sum+=v;cnt++;}d.setDate(d.getDate()-1);}
  return cnt?{avg:sum/cnt,cnt}:null;
}
function weightHTML(){
  const ds=iso(now);
  const cur=wAt(ds), prev=wPrev(ds);
  const val=(cur!=null)?cur:'';
  // 이번 주 목표: 주 시작(월요일) 기준 -1kg
  const mon=new Date(now); mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const startKeys=Object.keys(wLog()).filter(k=>k<iso(mon)&&wAt(k)!=null).sort();
  const weekStart=wAt(iso(mon))??(startKeys.length?wAt(startKeys[startKeys.length-1]):null);
  let weekHTML='';
  if(cur!=null&&weekStart!=null){
    const lost=weekStart-cur, remain=Math.max(0,WT_PACE-lost);
    const pct=Math.max(0,Math.min(100,(lost/WT_PACE)*100));
    weekHTML=`<div class="wt-card"><div class="l">이번 주 목표 (-${WT_PACE}kg)</div>
      <div class="v">${remain<=0?'달성! 🎉':remain.toFixed(1)+'<small>kg 남음</small>'}</div>
      <div class="wt-bar"><span style="width:${pct}%"></span></div></div>`;
  } else weekHTML=`<div class="wt-card"><div class="l">이번 주 목표 (-${WT_PACE}kg)</div><div class="v">—</div><div class="wt-bar"><span style="width:0%"></span></div></div>`;
  // 최종 목표
  let goalHTML2;
  if(cur!=null){
    const done=Math.max(0,WT_START-cur), left=Math.max(0,cur-WT_GOAL);
    const pct=Math.max(0,Math.min(100,(done/(WT_START-WT_GOAL))*100));
    goalHTML2=`<div class="wt-card"><div class="l">최종 ${WT_GOAL}kg까지</div>
      <div class="v">${left<=0?'달성! 🎉':left.toFixed(1)+'<small>kg 남음</small>'}</div>
      <div class="wt-bar"><span style="width:${pct}%"></span></div></div>`;
  } else goalHTML2=`<div class="wt-card"><div class="l">최종 ${WT_GOAL}kg까지</div><div class="v">—</div><div class="wt-bar"><span style="width:0%"></span></div></div>`;
  // 전날 대비
  let delta='';
  if(cur!=null&&prev){
    const d=cur-prev.v;
    const cls=d<-0.05?'dn':(d>0.05?'up':'same');
    const arrow=d<-0.05?'▼':(d>0.05?'▲':'—');
    delta=`<span class="wt-delta ${cls}">${arrow} ${Math.abs(d).toFixed(1)}kg</span>`;
  }
  // 주간 평균 추세 (최근 7일 vs 그 이전 7일)
  let trend='';
  const a=wAvg(now,7);
  if(a&&a.cnt>=2){
    const pd=new Date(now); pd.setDate(pd.getDate()-7);
    const b=wAvg(pd,7);
    let t='';
    if(b&&b.cnt>=2){const diff=a.avg-b.avg;t=` · 지난주 대비 ${diff<0?'▼':'▲'}${Math.abs(diff).toFixed(1)}kg`;}
    trend=`<span class="wt-trend">주간 평균 ${a.avg.toFixed(1)}kg${t}</span>`;
  }
  return `<div class="wt-box">
    <div class="wt-row1">
      <input class="wt-in" id="wtIn" type="number" step="0.1" inputmode="decimal" placeholder="0.0" value="${val}">
      <span class="wt-unit">kg</span>${delta}${trend}
    </div>
    <div class="wt-stats">${weekHTML}${goalHTML2}</div>
    ${cur==null?'<div class="wt-empty">오늘 몸무게를 입력하면 변화가 계산돼요</div>':''}
  </div>`;
}
function saveWeight(v){const n=parseFloat(v);const ds=iso(now);save({weight:{[ds]:(n&&n>0)?n:''}});}

function kcalState(v){
  const n=parseInt(v,10); if(!n||n<=0) return null;
  if(n<=1000) return {label:'성공적 다이어트',bg:'#d6ecfa',fg:'#2b6c93'};
  if(n<=1200) return {label:'적당한 칼로리!',bg:'#d8efd9',fg:'#3a6f42'};
  if(n<=1350) return {label:'약간 불안해…',bg:'#faeecd',fg:'#8a6a1f'};
  if(n<=1500) return {label:'살찜 경고!!',bg:'#f9d8d8',fg:'#a33c3c'};
  return {label:'확신의 멧돼지 🐗',bg:'#e2e4ea',fg:'#5a5f70'};
}
function saveKcal(v){const n=parseInt(v,10);const ds=iso(now);save({kcal:{[ds]:(n&&n>0)?n:''}});}
function toggleCheck(key){const v=!(STATE.checks&&STATE.checks[key]);save({checks:{[key]:v}});}
function addCustom(){const inp=document.getElementById('newTask');const tx=inp.value.trim();if(!tx)return;const ds=iso(now);const arr=[...((STATE.customTasks&&STATE.customTasks[ds])||[]),{id:Date.now().toString(36),tx}];save({customTasks:{[ds]:arr}});}
function delCustom(cid){const ds=iso(now);const arr=((STATE.customTasks&&STATE.customTasks[ds])||[]).filter(c=>c.id!==cid);save({customTasks:{[ds]:arr}});}

function renderHero(){
  const el=document.getElementById('hero');
  const c=T[cur.t[0]][1];
  const tags=cur.t.map(k=>`<span class="tag" style="background:${T[k][1]}">${T[k][0]}</span>`).join('');
  const rows=[['낮',cur.day],['저녁',cur.eve],['주말',cur.wk]].filter(r=>r[1]&&r[1]!=='—').map(r=>`<div class="li"><span class="k2">${r[0]}</span><span class="v">${esc(r[1])}</span></div>`).join('');
  el.innerHTML=`<span class="rail" style="background:${c}"></span>
    <div class="wk">W${cur.n} · ${fmt(cur.s)} – ${fmt(cur.e)} · 이번 주</div>
    <h1>${esc(cur.h.replace('★','').replace('⚠',''))}</h1>
    ${goalHTML(cur.n,'이번 주 GOAL',true)}
    <div class="list">${rows}</div>
    <div class="tags">${tags}</div>`;
}

function renderExam(){
  const el=document.getElementById('examCard');
  const up=EXAMS.map(x=>({...x,diff:Math.round((new Date(x.d+'T00:00:00')-now)/86400000)})).filter(x=>x.diff>=0).sort((a,b)=>a.diff-b.diff)[0];
  if(!up){el.innerHTML=`<div class="info"><div class="l">All done</div><div class="n">모든 시험 완주 🎉</div></div>`;return;}
  el.innerHTML=`<div class="cd" style="color:${up.c}">${up.diff===0?'D-DAY':'D-'+up.diff}</div><div class="info"><div class="l">다음 시험</div><div class="n">${up.l}</div><div class="d">${up.d.slice(5).replace('-','.')}</div></div>`;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const nowWk=weekOf(now);
  const months=[7,8,9,10,11,12];
  const maxW=Math.max(...months.map(m=>W.filter(w=>w.m===m).length));
  let out='';
  months.forEach(m=>{
    const ws=W.filter(w=>w.m===m);
    let cells='';
    ws.forEach(w=>{
      const isNow=(nowWk&&nowWk.n===w.n), isSel=(openWeekNum===w.n);
      const cols=w.t.slice(0,2).map(k=>T[k][1]);
      const c=cols.length>1?`linear-gradient(135deg,${cols[0]},${cols[1]})`:cols[0];
      const dim=wkEnd(w)<now?'dim':'';
      const started=wkStart(w)<=now;
      const prog=weekProgress(w);
      const pctHTML=started?`<span class="pct ${prog.pct<40?'low':''}">${prog.pct}%</span>`:'';
      cells+=`<div class="cell ${isNow?'now':''} ${isSel?'sel':''} ${dim}" data-w="${w.n}" style="--c:${c}">
        ${w.ex||w.dot?`<span class="ex"></span>`:''}${w.warn?`<span class="wn"></span>`:''}${pctHTML}
        <span class="tip"><b>W${w.n} · ${fmt(w.s)}–${fmt(w.e)}</b><br>${esc(w.h.replace('★','').replace('⚠',''))}</span></div>`;
    });
    for(let i=ws.length;i<maxW;i++) cells+=`<div class="cell" style="background:transparent"></div>`;
    out+=`<div class="mrow"><div class="ml">${m}월</div><div class="cells">${cells}</div></div>`;
  });
  grid.innerHTML=out;
}

function renderDaysHTML(w){
  let html='<div class="dp-head"><span class="dp-close" data-act="closePanel">✕ 닫기</span><b>W'+w.n+'</b> · '+esc(w.h.replace('★','').replace('⚠',''))+'</div>'+goalHTML(w.n,'W'+w.n+' GOAL',true);
  let d=new Date(w.s+'T00:00:00');const end=new Date(w.e+'T00:00:00');
  while(d<=end){
    const dow=d.getDay(),wknd=(dow===0||dow===6),ds=iso(d);
    const isT=(ds===iso(now)),past=(d<now&&!isT);
    const items=buildDay(w,new Date(d));
    let done=0;
    const its=items.map((it,i)=>{
      const key=ds+'::i'+i, chk=!!(STATE.checks&&STATE.checks[key]);
      if(chk)done++;
      return `<div class="it ${it.exam?'exam':''} ${chk?'done':''}" data-daykey="${key}" style="${it.exam?('background:'+it.c):('border-left-color:'+it.c)}"><span class="ibox"></span><span class="tm">${esc(it.tm)}</span><span class="tx">${esc(it.tx)}</span></div>`;
    }).join('');
    const prog=items.length?`<div class="dprog ${done===items.length?'full':''}">${done}/${items.length}</div>`:'';
    html+=`<div class="day ${wknd?'wknd':''} ${isT?'today':''} ${past?'past':''}"><div class="dd"><div class="dw">${DOW[dow]}</div><div class="dn">${d.getDate()}</div>${prog}</div><div class="items">${its}</div></div>`;
    d.setDate(d.getDate()+1);
  }
  return html;
}
function renderPanel(){
  const p=document.getElementById('dayPanel');
  if(openWeekNum==null){p.classList.remove('open');p.innerHTML='';return;}
  const w=W.find(x=>x.n===openWeekNum);if(!w){p.classList.remove('open');return;}
  p.innerHTML=renderDaysHTML(w);p.classList.add('open');
}
function renderLegend(){
  const lg=document.getElementById('legend');let h='';
  ['adsp','hanneung','sqld','opic','office','jlpt','study'].forEach(k=>{h+=`<div class="lg"><span class="sw" style="background:${T[k][1]}"></span>${T[k][0]}</div>`;});
  lg.innerHTML=h;
}
function renderAll(){renderTodo();renderHero();renderExam();renderGrid();renderLegend();renderPanel();}

/* ================= 상호작용 ================= */
function openWeek(n){openWeekNum=(openWeekNum===n?null:n);renderGrid();renderPanel();if(openWeekNum!=null){setTimeout(()=>document.getElementById('dayPanel').scrollIntoView({behavior:'smooth',block:'nearest'}),140);}}
document.getElementById('grid').onclick=e=>{const c=e.target.closest('.cell[data-w]');if(c)openWeek(+c.dataset.w);};
document.getElementById('hero').onclick=e=>{const ed=e.target.closest('[data-edit]');if(ed)openGoalEdit(+ed.dataset.edit);};
document.getElementById('dayPanel').onclick=e=>{
  if(e.target.closest('[data-act="closePanel"]')){openWeekNum=null;renderGrid();renderPanel();return;}
  const ed=e.target.closest('[data-edit]');if(ed){openGoalEdit(+ed.dataset.edit);return;}
  const dk=e.target.closest('[data-daykey]');if(dk)toggleCheck(dk.dataset.daykey);
};

/* ---- GOAL 편집 모달 ---- */
function geditHTML(type,g){
  g=g||{};
  if(type==='job') return `<div class="gedit" data-type="job">
    <div class="grow"><span class="badge" style="background:var(--adsp)">공고</span><span class="del-g" data-del>삭제</span></div>
    <div class="grow"><input class="f-name" placeholder="공고명" value="${esc(g.name||g.job)}"></div>
    <div class="grow"><select class="f-imp">${[5,4,3,2,1].map(v=>`<option value="${v}" ${(+g.imp===v)?'selected':''}>${IMP[v]}</option>`).join('')}</select><input class="f-due" placeholder="마감 (예: 수시 / 8-20)" value="${esc(g.due)}"></div></div>`;
  if(type==='exam') return `<div class="gedit" data-type="exam">
    <div class="grow"><span class="badge" style="background:var(--jlpt)">시험</span><span class="del-g" data-del>삭제</span></div>
    <div class="grow"><input class="f-text" placeholder="시험 / 목표" value="${esc(g.text||g.exam)}"></div></div>`;
  return `<div class="gedit" data-type="todo">
    <div class="grow"><span class="badge" style="background:var(--rest)">할 일</span><span class="del-g" data-del>삭제</span></div>
    <div class="grow"><input class="f-text" placeholder="할 일" value="${esc(g.text||g.todo)}"></div></div>`;
}
function openGoalEdit(n){
  EDIT_N=n;
  const items=getGoals(n).map(g=>geditHTML(typeOf(g),g)).join('');
  document.getElementById('modal').innerHTML=`<div class="modal">
    <h3>W${n} 목표 편집</h3>
    <div class="msub">공고·시험·할 일을 추가하거나 지울 수 있어요. 저장하면 폰·PC에 바로 반영돼요.</div>
    <div id="modalBody">${items}</div>
    <div class="madd"><button data-add="job">📋 공고 추가</button><button data-add="todo">• 할 일 추가</button></div>
    <div class="msave"><button class="cancel" data-m="cancel">취소</button><button class="save" data-m="save">저장</button></div></div>`;
  document.getElementById('modal').classList.add('open');
}
function readModal(){
  const arr=[];
  document.querySelectorAll('#modalBody .gedit').forEach(g=>{
    const ty=g.dataset.type;
    if(ty==='job'){const name=g.querySelector('.f-name').value.trim();if(!name)return;arr.push({type:'job',name,imp:+g.querySelector('.f-imp').value,due:g.querySelector('.f-due').value.trim()});}
    else{const tx=g.querySelector('.f-text').value.trim();if(!tx)return;arr.push({type:ty,text:tx});}
  });
  return arr;
}
const modalEl=document.getElementById('modal');
modalEl.onclick=e=>{
  const add=e.target.closest('[data-add]');
  if(add){document.getElementById('modalBody').insertAdjacentHTML('beforeend',geditHTML(add.dataset.add,{}));return;}
  if(e.target.closest('[data-del]')){e.target.closest('.gedit').remove();return;}
  const m=e.target.closest('[data-m]');
  if(m){if(m.dataset.m==='save')save({goals:{[EDIT_N]:readModal()}});modalEl.classList.remove('open');return;}
  if(e.target===modalEl)modalEl.classList.remove('open');
};

/* ================= Firebase ================= */
let db=null,F=null,stateRef=null;
function setSync(on){const s=document.getElementById('sync');s.className='sync '+(on?'on':'off');document.getElementById('syncTxt').textContent=on?'동기화됨':'로컬 모드';}
async function save(patch){
  deepMerge(STATE,patch);renderAll();
  if(db&&F&&stateRef){try{await F.setDoc(stateRef,patch,{merge:true});}catch(e){console.warn('저장 실패',e);}}
}
async function initFirebase(){
  try{
    const appMod=await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    const fs=await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");
    const app=appMod.initializeApp(firebaseConfig);
    db=fs.getFirestore(app);F=fs;
    stateRef=fs.doc(db,'roadmap','state');
    fs.onSnapshot(stateRef,snap=>{
      const d=snap.exists()?snap.data():{};
      STATE={checks:d.checks||{},customTasks:d.customTasks||{},goals:d.goals||{},kcal:d.kcal||{},weight:d.weight||{}};
      setSync(true);renderAll();
    },err=>{console.warn('구독 오류',err);setSync(false);});
  }catch(e){console.warn('Firebase 미연결(로컬 모드):',e);setSync(false);}
}

renderAll();
initFirebase();
</script>
