<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>레이 · 이번 주 대시보드</title>

<!-- 홈 화면 앱 설정 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0a9c8">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<!-- iOS -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="로드맵">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --paper:#eef0f8;--surface:#ffffff;--ink:#2c303c;--ink-soft:#5a5f70;--ink-faint:#8b90a2;--line:#dde0ec;
    --adsp:#9fb0e8;--hanneung:#f0a9c8;--korean:#a6cef0;--opic:#aacef2;--office:#b4bef0;--jlpt:#c3a8e2;--study:#e7abcf;--python:#a9d0ef;--sqld:#b8a4e0;--rest:#eeb2d2;
    --display:'Space Grotesk','Pretendard Variable',sans-serif;
    --body:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;padding:calc(22px + env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom));}
  .wrap{max-width:560px;margin:0 auto;}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .top .k{font-family:var(--display);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}
  .top .dt{font-family:var(--display);font-size:12px;color:var(--ink-soft);font-weight:500;}

  /* HERO — this week */
  .hero{background:linear-gradient(145deg,#7e8ac9,#6673bb);color:#fff;border-radius:24px;padding:24px 22px;position:relative;overflow:hidden;}
  .hero .rail{position:absolute;left:0;top:0;bottom:0;width:6px;}
  .hero .wk{font-family:var(--display);font-size:12px;letter-spacing:.06em;color:#e4e6f5;font-weight:600;margin-bottom:8px;}
  .hero h1{font-size:26px;line-height:1.2;font-weight:700;letter-spacing:-.01em;margin-bottom:18px;}
  .hero .list{display:grid;gap:9px;}
  .hero .li{display:grid;grid-template-columns:56px 1fr;gap:12px;font-size:14.5px;align-items:baseline;}
  .hero .li .k2{font-family:var(--display);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#e4e6f5;padding-top:2px;}
  .hero .li .v{color:#eef0f6;}
  .hero .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
  .hero .tag{font-size:11px;font-weight:700;border-radius:20px;padding:3px 11px;color:#39364f;}

  /* next exam */
  .exam-card{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
  .exam-card .cd{font-family:var(--display);font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1;}
  .exam-card .info .l{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);}
  .exam-card .info .n{font-size:16px;font-weight:700;margin-top:2px;}
  .exam-card .info .d{font-family:var(--display);font-size:12px;color:var(--ink-soft);}

  /* always-on */
  .habits{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .habit{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 13px;display:flex;gap:9px;align-items:center;font-size:12.5px;font-weight:500;color:var(--ink-soft);}
  .habit .d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .habit b{color:var(--ink);font-weight:600;}

  /* mini calendar grid */
  .mini{margin-top:26px;}
  .mini .h{font-family:var(--display);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .mini .h::after{content:"";flex:1;height:1px;background:var(--line);}
  .mrow{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;margin-bottom:7px;}
  .mrow .ml{font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink-soft);text-align:right;}
  .cells{display:flex;gap:5px;}
  .cell{flex:0 0 44px;height:44px;border-radius:14px;position:relative;background:linear-gradient(160deg,rgba(255,255,255,.55),rgba(255,255,255,0) 62%),var(--c,#d4d8e2);cursor:default;box-shadow:0 3px 9px rgba(150,162,210,.22),inset 0 1px 2px rgba(255,255,255,.7);transition:transform .16s,box-shadow .16s;}
  .cell.dim{opacity:.35;}
  .cell.now{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--ink),0 2px 8px rgba(40,50,45,.18);z-index:2;}
  .cell .ex{position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--jlpt);}
  .cell .pct{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:.01em;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(30,34,55,.35);}
  .cell .pct.low{color:rgba(60,64,80,.68);text-shadow:none;}
  .cell .wn{position:absolute;inset:0;border-radius:7px;border:2px dashed #b06a1e;}
  .cell .tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;line-height:1.35;font-weight:500;padding:7px 10px;border-radius:9px;width:150px;z-index:5;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .cell .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);}
  .cell:hover .tip{display:block;}

  .legend{display:flex;flex-wrap:wrap;gap:6px 13px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);font-weight:500;}
  .lg .sw{width:11px;height:11px;border-radius:3px;}

  .cell[data-w]{cursor:pointer;}
  .cell[data-w]:hover{transform:translateY(-2px);box-shadow:0 7px 15px rgba(150,162,210,.32),inset 0 1px 2px rgba(255,255,255,.8);}
  .cell.sel{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--hanneung),0 2px 8px rgba(40,50,45,.18);z-index:3;}

  .day-panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .35s;}
  .day-panel.open{max-height:2000px;opacity:1;margin-top:18px;}
  .dp-head{font-family:var(--display);font-size:12.5px;letter-spacing:.03em;font-weight:600;color:var(--ink-soft);padding-bottom:10px;margin-bottom:4px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .dp-head b{color:var(--ink);}
  .dp-close{float:right;cursor:pointer;color:var(--ink-faint);font-size:15px;line-height:1;}
  .day{display:grid;grid-template-columns:44px 1fr;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .day:last-child{border-bottom:none;}
  .day.today{background:linear-gradient(90deg,rgba(120,138,201,.10),transparent);border-radius:10px;}
  .day.past{opacity:.58;}
  .day .dd{text-align:center;padding-top:4px;}
  .day .dd .dw{font-family:var(--display);font-size:11px;font-weight:600;color:var(--ink-faint);}
  .day .dd .dn{font-family:var(--display);font-size:19px;font-weight:700;color:var(--ink);line-height:1.05;}
  .day .dd .dprog{font-family:var(--display);font-size:10px;font-weight:700;color:var(--ink-faint);margin-top:3px;background:var(--line);border-radius:20px;padding:1px 0;}
  .day .dd .dprog.full{background:var(--opic);color:#5a4415;}
  .day.wknd .dd .dn{color:var(--hanneung);}
  .day.today .dd .dw{color:var(--ink);}
  .day .items{display:flex;flex-direction:column;gap:5px;}
  .day .it{display:grid;grid-template-columns:17px 74px 1fr;gap:9px;align-items:center;font-size:12.5px;background:#f4f5fa;border-left:3px solid var(--rest);border-radius:6px;padding:6px 10px;cursor:pointer;}
  .day .it .ibox{width:16px;height:16px;border-radius:5px;border:2px solid var(--line);background:#fff;position:relative;transition:.15s;}
  .day .it.done .ibox{background:var(--opic);border-color:var(--opic);}
  .day .it.done .ibox::after{content:'✓';position:absolute;top:-4px;left:1px;font-size:12px;color:#fff;font-weight:700;}
  .day .it .tm{font-family:var(--display);font-size:10.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.01em;}
  .day .it .tx{color:var(--ink);font-weight:500;}
  .day .it.done .tx{color:var(--ink-faint);text-decoration:line-through;}
  .day .it.exam{border:none!important;}
  .day .it.exam .tm,.day .it.exam .tx{color:#fff;font-weight:700;}
  .day .it.exam .ibox{border-color:rgba(255,255,255,.7);background:transparent;}
  .day .it.exam.done .ibox{background:#fff;}
  .day .it.exam.done .ibox::after{color:var(--opic);}

  .goal-box{border-radius:13px;padding:13px 15px;margin:16px 0 4px;}
  .hero .goal-box{background:rgba(255,255,255,.10);}
  .goal-label{font-family:var(--display);font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:9px;}
  .hero .goal-label{color:#dfe1f2;}
  .goal{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;flex-wrap:wrap;line-height:1.4;}
  .goal .gi{flex-shrink:0;font-size:12.5px;}
  .goal .gt{font-weight:600;}
  .hero .goal .gt{color:#fff;}
  .goal .imp{font-size:10.5px;letter-spacing:.06em;font-weight:700;color:var(--opic);}
  .goal .due{font-size:10px;font-weight:600;padding:1.5px 8px;border-radius:20px;white-space:nowrap;}
  .hero .goal .due{background:rgba(255,255,255,.16);color:#e6e9f5;}
  .hero .goal.exam .gt{color:#ffcf9e;}
  .day-panel .goal-box{background:#f5f6f9;border:1px solid var(--line);margin:12px 0 16px;}
  .day-panel .goal-label{color:var(--ink-faint);}
  .day-panel .goal .gt{color:var(--ink);}
  .day-panel .goal .due{background:var(--ink);color:#fff;}
  .day-panel .goal.exam .gt{color:var(--jlpt);}

  /* sync badge */
  .sync{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-faint);}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:#c3c8d6;transition:.3s;}
  .sync.on .dot{background:#2e8b6b;}
  .sync.wait .dot{background:#c8a83e;animation:syncPulse 1s ease-in-out infinite;}
  @keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync.off .dot{background:#d98a52;}

  /* today todo card */
  .today-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:20px 20px 16px;margin-bottom:14px;box-shadow:0 12px 34px rgba(30,34,60,.07);}
  .tc-top{display:flex;align-items:baseline;justify-content:space-between;}
  .tc-top .tt{font-family:var(--display);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--opic);font-weight:700;}
  .tc-top .dd{font-family:var(--display);font-size:12px;color:var(--ink-faint);}
  .tc-title{font-size:19px;font-weight:700;letter-spacing:-.01em;margin:5px 0 8px;}
  .kcal-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .kcal-in{width:76px;border:1px solid var(--line);border-radius:9px;padding:6px 9px;font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink);outline:none;text-align:right;background:#fff;}
  .kcal-in:focus{border-color:var(--jlpt);}
  .kcal-unit{font-family:var(--display);font-size:12.5px;font-weight:600;color:var(--ink-faint);}
  .kcal-badge{font-size:11.5px;font-weight:700;border-radius:20px;padding:4px 12px;}
  .kcal-ai{margin-left:auto;font-size:11px;font-weight:600;text-decoration:none;color:var(--ink-soft);border:1px solid var(--line);border-radius:20px;padding:5px 11px;white-space:nowrap;background:#fff;}
  .kcal-ai:hover{border-color:var(--jlpt);color:var(--jlpt);}

  .kcal-toggle{font-size:11px;font-weight:700;color:var(--ink-soft);background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 11px;cursor:pointer;font-family:var(--body);white-space:nowrap;}
  .kcal-toggle:hover{border-color:var(--jlpt);color:var(--jlpt);}
  .kcal-net{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink);}
  .kcal-net small{font-size:10.5px;font-weight:600;color:var(--ink-faint);margin-left:3px;}
  .kcal-panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;}
  .kcal-panel.open{max-height:900px;opacity:1;margin-bottom:12px;}
  .kp-sec{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;}
  .kp-sec.plus{border-left:3px solid var(--hanneung);}
  .kp-sec.minus{border-left:3px solid var(--korean);}
  .kp-head{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
  .kp-head .sum{margin-left:auto;font-family:var(--display);font-size:12.5px;font-weight:700;}
  .kp-sec.plus .sum{color:#a33c3c;}
  .kp-sec.minus .sum{color:#3a6f42;}
  .kp-item{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .kp-item input.n{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-family:var(--body);font-size:12.5px;color:var(--ink);outline:none;}
  .kp-item input.c{width:64px;border:1px solid var(--line);border-radius:8px;padding:6px 7px;font-family:var(--display);font-size:12.5px;font-weight:700;color:var(--ink);outline:none;text-align:right;}
  .kp-item input:focus{border-color:var(--jlpt);}
  .kp-item .x{color:var(--ink-faint);font-size:14px;cursor:pointer;padding:0 3px;opacity:.5;}
  .kp-item .x:hover{opacity:1;color:var(--hanneung);}
  .kp-add{width:100%;border:1px dashed var(--ink-faint);background:transparent;border-radius:8px;padding:7px;font-family:var(--body);font-size:11.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;margin-top:2px;}
  .kp-add:hover{background:#fafbfe;color:var(--jlpt);border-color:var(--jlpt);}

  .lec-link{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:#fff;background:rgba(0,0,0,.16);border-radius:20px;padding:2px 9px;text-decoration:none;margin-left:8px;white-space:nowrap;}
  .lec-link:hover{background:rgba(0,0,0,.28);}
  .day .it .lec-link{color:var(--jlpt);background:#eef0f8;}
  .day .it .lec-link:hover{background:#dfe2f5;}
  .day .it .row-top{display:flex;align-items:center;flex-wrap:wrap;gap:2px;}

  .pp-btn{flex-shrink:0;font-size:10.5px;font-weight:600;color:var(--ink-faint);background:#f4f5fa;border:1px solid var(--line);border-radius:20px;padding:4px 9px;cursor:pointer;white-space:nowrap;font-family:var(--body);}
  .pp-btn.pp-hide{visibility:hidden;pointer-events:none;}
  .pp-btn.giveup{color:#a86b6b;border-color:#e8cccc;background:#fbf3f3;}
  .pp-btn.giveup:hover{background:#f3dede;color:#8a4a4a;}
  .skip-box{margin:10px 0 4px;border:1px dashed var(--line);border-radius:12px;background:#faf9f7;overflow:hidden;}
  .skip-head{padding:9px 13px;font-size:12px;font-weight:700;color:var(--ink-faint);cursor:pointer;user-select:none;}
  .skip-head:hover{color:var(--ink-soft);}
  .skip-list{display:none;padding:0 11px 9px;}
  .skip-box.open .skip-list{display:block;}
  .skip-row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-top:1px solid var(--line);}
  .skip-row .skt{flex:1;font-size:13px;color:var(--ink-faint);text-decoration:line-through;}
  .skip-restore,.skip-del{flex-shrink:0;font-size:10.5px;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:4px 9px;cursor:pointer;background:#fff;font-family:var(--body);white-space:nowrap;}
  .skip-restore{color:var(--opic);border-color:#bfe3d5;}
  .skip-restore:hover{background:#e6f5ee;}
  .skip-del{color:#a33c3c;border-color:#f0c9c9;}
  .skip-del:hover{background:#fbeaea;}
  .pp-btn:hover{color:var(--jlpt);border-color:var(--jlpt);background:#eef0fb;}
  .yest-box{background:linear-gradient(140deg,#fdf3ee,#fdf0f4);border:1px solid #f3d9cf;border-radius:14px;padding:12px 14px;margin-bottom:12px;}
  .yest-label{font-family:var(--display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#b06a4a;margin-bottom:8px;}
  .yest-row{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12.5px;}
  .yest-row .yt{flex:1;color:var(--ink);font-weight:500;}
  .yest-row .pull{flex-shrink:0;font-size:10.5px;font-weight:700;color:#fff;background:var(--hanneung);border:none;border-radius:20px;padding:5px 11px;cursor:pointer;font-family:var(--body);}
  .yest-row .pull:hover{filter:brightness(1.08);}

  .habit{cursor:pointer;transition:transform .14s,box-shadow .14s;}
  .habit:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(150,162,210,.18);}

  .cert-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  .cert-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 12px;cursor:pointer;transition:transform .14s,box-shadow .14s;}
  .cert-card:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(150,162,210,.18);}
  .cert-card .cn{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
  .cc-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .cc-top .cn{margin-bottom:0;}
  .cc-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cc-kana{font-family:var(--display);font-size:15px;font-weight:700;line-height:1;}
  .cert-card .cp{font-family:var(--display);font-size:17px;font-weight:700;color:var(--ink);}
  .cert-card .cp small{font-size:10.5px;font-weight:600;color:var(--ink-faint);margin-left:2px;}
  .cert-card .cbar{height:5px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:6px;}
  .cert-card .cbar span{display:block;height:100%;border-radius:6px;transition:width .4s;}

  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-card{background:#f5f6fb;border-radius:12px;padding:12px 13px;}
  .stat-card .sl{font-size:10.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.03em;}
  .stat-card .sv{font-family:var(--display);font-size:21px;font-weight:700;color:var(--ink);margin-top:3px;}
  .stat-card .sv small{font-size:11px;font-weight:600;color:var(--ink-faint);margin-left:2px;}

  .mlist{max-height:340px;overflow-y:auto;border-top:1px solid var(--line);margin-top:4px;}
  .mrow2{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid #eef0f6;font-size:12.5px;}
  .mrow2 .mbox{width:19px;height:19px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;position:relative;background:#fff;}
  .mrow2 .mbox.on{background:var(--jlpt);border-color:var(--jlpt);}
  .mrow2 .mbox.on::after{content:'✓';position:absolute;top:-3px;left:1px;font-size:11px;color:#fff;font-weight:700;}
  .mrow2 .mtx{flex:1;color:var(--ink);cursor:pointer;}
  .mrow2.done .mtx{color:var(--ink-faint);text-decoration:line-through;}
  .mrow2 .mmeta{font-size:10.5px;color:var(--ink-faint);white-space:nowrap;font-family:var(--display);}
  .mrow2 .mimp{font-size:10px;color:var(--opic);white-space:nowrap;}

const DOW=['일','월','화','수','목','금','토'];

/* ================= 유틸 ================= */
function t0(){const t=new Date();if(t.getHours()<5){t.setDate(t.getDate()-1);}t.setHours(0,0,0,0);return t;}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmt(s){const p=s.split('-');return (+p[1])+'/'+(+p[2]);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function wkStart(w){return new Date(w.s+'T00:00:00');}
function wkEnd(w){return new Date(w.e+'T23:59:59');}
function weekOf(d){const w=W.find(w=>d>=wkStart(w)&&d<=wkEnd(w));return w?getWeek(w.n):null;}
function weekProgress(w){
  let done=0,total=0;
  let d=new Date(w.s+'T00:00:00');const end=new Date(w.e+'T00:00:00');
  while(d<=end){
    const ds=iso(d);
    const items=buildDay(w,new Date(d));
    items.forEach((it,i)=>{
      total++;
      if(STATE.checks&&STATE.checks[ds+'::i'+i])done++;
    });
    d.setDate(d.getDate()+1);
  }
  return {done,total,pct:total?Math.round(done/total*100):0};
}
function deepMerge(t,s){for(const k in s){const v=s[k];if(v&&typeof v==='object'&&!Array.isArray(v)){if(!t[k]||typeof t[k]!=='object')t[k]={};deepMerge(t[k],v);}else t[k]=v;}}
let openWeekNum=null, EDIT_N=null, KOPEN=false, SKOPEN=false;

/* ================= 상태 ================= */
let STATE={checks:{},customTasks:{},goals:{},kcal:{},weight:{},foods:{},exs:{},postponed:{},applied:{},jlptWords:{},hanneungMock:{},weightGoal:{},memos:{},skipped:{},jobOverrides:{},ledger:{},calGoal:{},budget:{},weekOverrides:{},dayPlans:{},weekFlags:{}};
function getGoals(n){return (STATE.goals&&STATE.goals[n])||DEFAULT_GOALS[n]||[];}
/* 주간 계획: 코드의 W + 앱에서 수정한 STATE.weekOverrides 를 합쳐서 반환 */
function getWeek(n){
  const base=W.find(x=>x.n===n)||{};
  const ov=(STATE.weekOverrides&&STATE.weekOverrides[n])||{};
  return Object.assign({},base,ov);
}
/* STATE 선언 이후에 초기화해야 함 (weekOf → getWeek → STATE 참조) */
const now=t0();
let cur=weekOf(now)||getWeek(now<wkStart(W[0])?W[0].n:W[W.length-1].n);
function typeOf(g){return g.type||(g.job?'job':g.exam?'exam':'todo');}

/* ================= buildDay ================= */
function dayPlan(ds){return (STATE.dayPlans&&STATE.dayPlans[ds])||DETAIL[ds];}
function weekFlag(wn){return (STATE.weekFlags&&STATE.weekFlags[wn])||{};}
function slotOf(dow){ if(dow===1||dow===3)return '20:00–21:30'; if(dow===2||dow===4||dow===5)return '낮 블록'; return '오전'; }
function buildDay(w,date){
  const ds=iso(date), dow=date.getDay(), it=[];
  const ex=EXAMS.find(x=>x.d===ds);
  if(ex){
    it.push({tm:'시험일',tx:ex.l+' 응시 🎯',exam:true,c:ex.c});
    if(dayPlan(ds)) dayPlan(ds).forEach(x=>it.push({tm:x.tm||'저녁',tx:x.tx,c:'var(--'+x.c+')',lec:x.lec,hot:x.hot}));
    it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'});
    return it;
  }
  if(w.warn){ it.push({tm:'종일',tx:'학과 시험 공부 — 자격증은 잠시 STOP',c:'var(--study)'}); it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'}); it.push({tm:'자기 전',tx:'JLPT 단어 15분 (여유되면)',c:'var(--jlpt)'}); return it; }
  const plan=dayPlan(ds);
  if(plan) plan.forEach(x=>it.push({tm:x.tm||slotOf(dow),tx:x.tx,c:'var(--'+x.c+')',lec:x.lec,hot:x.hot}));
  else {
    const PC='var(--'+w.t[0]+')';
    if(dow===1||dow===3) it.push({tm:slotOf(dow),tx:w.eve,c:PC});
    else if(dow===2||dow===4||dow===5) it.push({tm:slotOf(dow),tx:w.day,c:PC});
    else it.push({tm:slotOf(dow),tx:w.wk,c:PC});
  }
  const _wf=weekFlag(w.n);
  if(!_wf.noEx){
    if(dow===2) it.push({tm:'18:30–20:30',tx:'운동 · 유산소 + 하체',c:'var(--opic)'});
    else if(dow===4) it.push({tm:'18:30–20:30',tx:'운동 · 유산소',c:'var(--opic)'});
    else if(dow===5) it.push({tm:'18:30–20:30',tx:'운동 · 유산소 + 상체',c:'var(--opic)'});
  }
  it.push({tm:'식단',tx:'점심·저녁·간식 기록',c:'var(--rest)'});
  it.push({tm:'아침',tx:'몸무게 기록',c:'var(--hanneung)'});
  if(!it.some(x=>x.c==='var(--jlpt)')) it.push({tm:'자기 전',tx:'JLPT 단어 15분',c:'var(--jlpt)'});
  return it;
}

function goalHTML(n,label,edit){
  const gs=getGoals(n);
  const eb=edit?`<button class="goal-edit" data-edit="${n}">✎ 편집</button>`:'';
  let rows;
  if(!gs.length) rows=`<div class="goal"><span class="gi">•</span><span class="gt" style="opacity:.55">등록된 목표 없음 — 편집으로 추가</span></div>`;
  else rows=gs.map(g=>{
    const ty=typeOf(g);
    if(ty==='job') return `<div class="goal job"><span class="gi">📋</span><span class="gt">${esc(g.name||g.job)}</span><span class="imp">${IMP[g.imp]||''}</span><span class="due">${esc(g.due)}</span></div>`;
    if(ty==='exam') return `<div class="goal exam"><span class="gi">🎯</span><span class="gt">${esc(g.text||g.exam)}</span></div>`;
    return `<div class="goal"><span class="gi">•</span><span class="gt">${esc(g.text||g.todo)}</span></div>`;
  }).join('');
  return `<div class="goal-box"><div class="goal-label">${label}${eb}</div>${rows}</div>`;
}

function tomorrowDs(){const d=new Date(now);d.setDate(d.getDate()+1);return iso(d);}
function yesterdayDs(){const d=new Date(now);d.setDate(d.getDate()-1);return iso(d);}
let TODAY_ITEMS=[], YEST_ITEMS=[], SKIPPED_ITEMS=[];

function renderTodo(){
  const card=document.getElementById('todayCard');
  const wk=weekOf(now), ds=iso(now);
  const baseAll=wk?buildDay(wk,now):[];
  const base=baseAll.map((it,i)=>({...it,_key:ds+'::i'+i})).filter(it=>!(STATE.postponed&&STATE.postponed[it._key]));
  const customs=(STATE.customTasks&&STATE.customTasks[ds])||[];
  const allItems=[...base.map(it=>({key:it._key,tm:it.tm,tx:it.tx,lec:it.lec,c:it.c,hot:it.hot})),...customs.map(c=>({key:ds+'::c'+c.id,tm:'추가',tx:c.tx,cid:c.id,origKey:c.origKey}))];

  SKIPPED_ITEMS=skippedItems;

  const pct=items.length?Math.round(doneN/items.length*100):0;
  const jlptWordVal=(STATE.jlptWords&&STATE.jlptWords[ds])||'';
  let jlptShown=false;
  const rowsHtml=items.length?items.map((x,idx)=>{

    const lecBtn=x.lec?`<a class="lec-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(x.lec)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🎬 강의</a>`:'';
    const isJlpt=(x.c==='var(--jlpt)')||/JLPT/i.test(x.tx);
    let jlptBox='';
    if(isJlpt&&!jlptShown){jlptShown=true;jlptBox=`<div class="jlpt-inline"><input id="jlptCntIn" type="number" inputmode="numeric" placeholder="0" value="${esc(jlptWordVal)}"><span class="ju">개</span></div>`;}
    const memoText=(STATE.memos&&STATE.memos[x.key])||'';
    const memoHtml=memoText
      ? `<span class="memo-badge" data-act="memoOpen" data-key="${x.key}">📝 메모<span class="tip">${esc(memoText)}</span></span>`
      : `<button class="pp-btn memo-add" data-act="memoOpen" data-key="${x.key}">📝 메모</button>`;
    return `<div class="todo ${done?'done':''} ${x.hot?'hot':''}" data-key="${x.key}">
      <div class="box" data-act="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="tmain">
        <div class="tcont" data-act="check"><div class="ttm">${esc(x.tm)}</div><div class="ttx">${esc(x.tx)}${lecBtn}</div></div>
        <div class="tactions">
          ${jlptBox}
          ${memoHtml}
          <button class="pp-btn ${done?'pp-hide':''}" data-act="postpone" data-idx="${idx}">↷ 내일로</button>
          ${done?'':`<button class="pp-btn giveup" data-act="skip" data-key="${x.key}" title="이 할 일을 포기함으로 표시">✕ 포기</button>`}
          ${x.cid?(x.origKey?`<button class="pp-btn restore" data-act="del" data-cid="${x.cid}" title="원래 자리로 되돌리기">↺ 되돌리기</button>`:`<button class="pp-btn del-btn" data-act="del" data-cid="${x.cid}" title="삭제">✕ 삭제</button>`):''}
        </div>
      </div></div>`;
  }).join(''):`<div class="tc-empty">오늘은 등록된 일정이 없어요.<br>아래에서 직접 추가해봐요!</div>`;

  // 어제 놓친 일
  const yd=yesterdayDs();
  const ywk=weekOf(new Date(yd+'T00:00:00'));
  const yBaseAll=ywk?buildDay(ywk,new Date(yd+'T00:00:00')):[];
  const yBase=yBaseAll.map((it,i)=>({key:yd+'::i'+i,tx:it.tx})).filter(it=>!(STATE.checks&&STATE.checks[it.key])&&!(STATE.postponed&&STATE.postponed[it.key])&&!(STATE.skipped&&STATE.skipped[it.key]));
  const yCustoms=((STATE.customTasks&&STATE.customTasks[yd])||[]).filter(c=>!(STATE.checks&&STATE.checks[yd+'::c'+c.id])&&!(STATE.skipped&&STATE.skipped[yd+'::c'+c.id])).map(c=>({key:yd+'::c'+c.id,tx:c.tx,cid:c.id,origKey:c.origKey}));
  const yItems=[...yBase,...yCustoms];
  YEST_ITEMS=yItems;
  const yestHTML=yItems.length?`<div class="yest-box"><div class="yest-label">어제 놓친 일 (${yItems.length})</div>
    ${yItems.map((y,idx)=>`<div class="yest-row"><span class="yt">${esc(y.tx)}</span><button class="pull" data-act="pull" data-idx="${idx}">↩ 오늘로</button></div>`).join('')}
    </div>`:'';

  const dstr=`${now.getMonth()+1}월 ${now.getDate()}일 (${DOW[now.getDay()]})`;
  const foods=(STATE.foods&&STATE.foods[ds])||[];
  const exs=(STATE.exs&&STATE.exs[ds])||[];
  const inSum=foods.reduce((a,b)=>a+(parseInt(b.c,10)||0),0);
  const outSum=exs.reduce((a,b)=>a+(parseInt(b.c,10)||0),0);
  const net=inSum-outSum;
  const kst=kcalState(net>0?net:0);
  const skipHTML=skippedItems.length?`<div class="skip-box ${SKOPEN?'open':''}">
    <div class="skip-head" data-act="skexp"><span>${SKOPEN?'▾':'▸'} 포기한 일 (${skippedItems.length})</span></div>
    <div class="skip-list">${skippedItems.map(s=>`<div class="skip-row"><span class="skt">${esc(s.tx)}</span><button class="skip-restore" data-act="unskip" data-key="${esc(s.key)}">↺ 되살리기</button><button class="skip-del" data-act="skdel" data-key="${esc(s.key)}" data-cid="${s.cid||''}" data-origkey="${s.origKey||''}">🗑 삭제</button></div>`).join('')}</div>
  </div>`:'';
  card.innerHTML=`${yestHTML}<div class="tc-top"><span class="tt">Today · 오늘 할 일</span><span class="dd">${dstr}</span></div>
    <div class="tc-title">${wk?esc(wk.h.replace('★','').replace('⚠','')):'오늘'}</div>
    <div class="kcal-row">
      <span class="kcal-net">${net>0?net.toLocaleString():'—'}<small>/ 1,200 kcal</small></span>

      <button class="kcal-toggle" data-act="kexp">${KOPEN?'▲ 접기':'▼ 식단·운동 입력'}</button>

    </div>
    <div class="kcal-panel ${KOPEN?'open':''}">
      <div class="kp-sec plus">
        <div class="kp-head">＋ 오늘 먹은 것<span class="sum">+${inSum.toLocaleString()} kcal</span></div>

    <div class="tc-add"><input id="newTask" placeholder="할 일 직접 추가…" maxlength="60"><button data-act="add">추가</button></div>`;
  card.onclick=e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    const a=t.dataset.act;
    if(a==='check'){toggleCheck(t.closest('.todo').dataset.key);}
    else if(a==='del'){delCustom(t.dataset.cid);}
    else if(a==='add'){addCustom();}
    else if(a==='kexp'){KOPEN=!KOPEN;renderTodo();}
    else if(a==='fadd'){KOPEN=true;const arr=[...((STATE.foods&&STATE.foods[ds])||[]),{n:'',c:''}];save({foods:{[ds]:arr}});}
    else if(a==='eadd'){KOPEN=true;const arr=[...((STATE.exs&&STATE.exs[ds])||[]),{n:'',c:''}];save({exs:{[ds]:arr}});}
    else if(a==='fdel'){KOPEN=true;const arr=((STATE.foods&&STATE.foods[ds])||[]).filter((_,i)=>i!=t.dataset.i);save({foods:{[ds]:arr}});}
    else if(a==='edel'){KOPEN=true;const arr=((STATE.exs&&STATE.exs[ds])||[]).filter((_,i)=>i!=t.dataset.i);save({exs:{[ds]:arr}});}
    else if(a==='postpone'){const item=TODAY_ITEMS[t.dataset.idx];if(item)postponeToTomorrow(item,ds);}
    else if(a==='pull'){const item=YEST_ITEMS[t.dataset.idx];if(item)pullFromYesterday(item,ds);}
    else if(a==='wgedit'){openWeightGoalModal();}
    else if(a==='memoOpen'){openMemoModal(t.dataset.key);}
    else if(a==='skip'){SKOPEN=true;save({skipped:{[t.dataset.key]:true}});}
    else if(a==='unskip'){save({skipped:{[t.dataset.key]:false}});}
    else if(a==='skexp'){SKOPEN=!SKOPEN;renderTodo();}
    else if(a==='skdel'){skipDelete(t.dataset.key,t.dataset.cid,t.dataset.origkey);}

  const inp=card.querySelector('#newTask');

/* ---- 몸무게 트래커 ---- */
const WT_START=67, WT_GOAL=59, WT_PACE=1;   // 시작 67kg → 목표 59kg (-8kg), 주 1kg 페이스 (기본값, 아래 함수로 오버라이드 가능)
function wtGoal(){const v=STATE.weightGoal&&STATE.weightGoal.goal;return (v!=null&&v!=='')?+v:WT_GOAL;}
function wtPace(){const v=STATE.weightGoal&&STATE.weightGoal.pace;return (v!=null&&v!=='')?+v:WT_PACE;}
function wLog(){return STATE.weight||{};}
function wAt(dsx){const v=wLog()[dsx];return (v||v===0)?parseFloat(v):null;}
function wPrev(ds){ // 가장 최근의 이전 기록
  const keys=Object.keys(wLog()).filter(k=>k<ds&&wAt(k)!=null).sort();
  return keys.length?{d:keys[keys.length-1],v:wAt(keys[keys.length-1])}:null;
}
function wAvg(endDate,days){ // 최근 n일 평균
  let sum=0,cnt=0,d=new Date(endDate);
  for(let i=0;i<days;i++){const v=wAt(iso(d));if(v!=null){sum+=v;cnt++;}d.setDate(d.getDate()-1);}
  return cnt?{avg:sum/cnt,cnt}:null;
}
function weightHTML(){
  const ds=iso(now);
  const cur=wAt(ds), prev=wPrev(ds);
  const val=(cur!=null)?cur:'';
  const GOAL=wtGoal(), PACE=wtPace();
  // 이번 주 목표: 주 시작(월요일) 기준 -PACE kg
  const mon=new Date(now); mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const startKeys=Object.keys(wLog()).filter(k=>k<iso(mon)&&wAt(k)!=null).sort();
  const weekStart=wAt(iso(mon))??(startKeys.length?wAt(startKeys[startKeys.length-1]):null);
  let weekHTML='';
  if(cur!=null&&weekStart!=null){
    const lost=weekStart-cur, remain=Math.max(0,PACE-lost);
    const pct=Math.max(0,Math.min(100,(lost/PACE)*100));
    weekHTML=`<div class="wt-card"><div class="l">이번 주 목표 (-${PACE}kg)</div>
      <div class="v">${remain<=0?'달성! 🎉':remain.toFixed(1)+'<small>kg 남음</small>'}</div>
      <div class="wt-bar"><span style="width:${pct}%"></span></div></div>`;
  } else weekHTML=`<div class="wt-card"><div class="l">이번 주 목표 (-${PACE}kg)</div><div class="v">—</div><div class="wt-bar"><span style="width:0%"></span></div></div>`;
  // 최종 목표
  let goalHTML2;
  if(cur!=null){
    const done=Math.max(0,WT_START-cur), left=Math.max(0,cur-GOAL);
    const pct=Math.max(0,Math.min(100,(done/(WT_START-GOAL))*100));
    goalHTML2=`<div class="wt-card"><div class="l">최종 ${GOAL}kg까지</div>
      <div class="v">${left<=0?'달성! 🎉':left.toFixed(1)+'<small>kg 남음</small>'}</div>
      <div class="wt-bar"><span style="width:${pct}%"></span></div></div>`;
  } else goalHTML2=`<div class="wt-card"><div class="l">최종 ${GOAL}kg까지</div><div class="v">—</div><div class="wt-bar"><span style="width:0%"></span></div></div>`;
  // 전날 대비
  let delta='';
  if(cur!=null&&prev){
    const d=cur-prev.v;
    const cls=d<-0.05?'dn':(d>0.05?'up':'same');
    const arrow=d<-0.05?'▼':(d>0.05?'▲':'—');
    delta=`<span class="wt-delta ${cls}">${arrow} ${Math.abs(d).toFixed(1)}kg</span>`;
  }
  // 주간 평균 추세 (최근 7일 vs 그 이전 7일)
  let trend='';
  const a=wAvg(now,7);
  if(a&&a.cnt>=2){
    const pd=new Date(now); pd.setDate(pd.getDate()-7);
    const b=wAvg(pd,7);
    let t='';
    if(b&&b.cnt>=2){const diff=a.avg-b.avg;t=` · 지난주 대비 ${diff<0?'▼':'▲'}${Math.abs(diff).toFixed(1)}kg`;}
    trend=`<span class="wt-trend">주간 평균 ${a.avg.toFixed(1)}kg${t}</span>`;
  }
  return `<div class="wt-box">
    <div class="wt-topline"><span class="wt-label">몸무게</span><span class="wt-edit" data-act="wgedit">✎ 목표 수정</span></div>
    <div class="wt-row1">
      <input class="wt-in" id="wtIn" type="number" step="0.1" inputmode="decimal" placeholder="0.0" value="${val}">
      <span class="wt-unit">kg</span>${delta}${trend}
    </div>
    <div class="wt-stats">${weekHTML}${goalHTML2}</div>
    ${cur==null?'<div class="wt-empty">오늘 몸무게를 입력하면 변화가 계산돼요</div>':''}
  </div>`;
}

function skipDelete(key,cid,origKey){
  if(!confirm('이 할 일을 완전히 삭제할까요?\n(되살릴 수 없어요)'))return;
  const ds=iso(now);
  const patch={skipped:{[key]:false}};
  if(cid){ // 커스텀(직접 추가/이동된) 항목 — 배열에서 제거
    const arr=((STATE.customTasks&&STATE.customTasks[ds])||[]).filter(c=>c.id!==cid);
    patch.customTasks={[ds]:arr};
    if(origKey)patch.postponed={[origKey]:true}; // 이동돼 온 항목이면 원래 자리에서도 숨김 유지
  } else { // 기본 계획 항목 — postponed로 오늘에서 숨김
    patch.postponed={[key]:true};
  }
  save(patch);
}

function newId(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// item: {key, tx, cid?}  today(ds)의 항목을 내일로 미루기
function postponeToTomorrow(item,ds){
  const td=tomorrowDs();
  const origKey=item.cid?item.origKey:item.key;
  const tArr=[...((STATE.customTasks&&STATE.customTasks[td])||[]),{id:newId(),tx:item.tx,origKey}];
  if(item.cid){ // 사용자 추가/이동된 항목 — 오늘에서 빼고 내일로 이동
    const arr=((STATE.customTasks&&STATE.customTasks[ds])||[]).filter(c=>c.id!==item.cid);
    save({customTasks:{[ds]:arr,[td]:tArr}});
  } else { // 기본 계획 항목 — 오늘엔 숨기고 내일 커스텀으로 추가
    save({postponed:{[item.key]:true},customTasks:{[td]:tArr}});
  }
}

// item: {key, tx, cid?}  어제(yd)의 항목을 오늘로 가져오기
function pullFromYesterday(item,ds){
  const yd=yesterdayDs();
  const origKey=item.cid?item.origKey:item.key;
  const tArr=[...((STATE.customTasks&&STATE.customTasks[ds])||[]),{id:newId(),tx:item.tx,origKey}];
  if(item.cid){
    const arr=((STATE.customTasks&&STATE.customTasks[yd])||[]).filter(c=>c.id!==item.cid);
    save({customTasks:{[yd]:arr,[ds]:tArr}});
  } else {
    save({postponed:{[item.key]:true},customTasks:{[ds]:tArr}});
  }
}
function addCustom(){const inp=document.getElementById('newTask');const tx=inp.value.trim();if(!tx)return;const ds=iso(now);const arr=[...((STATE.customTasks&&STATE.customTasks[ds])||[]),{id:Date.now().toString(36),tx}];save({customTasks:{[ds]:arr}});}
function delCustom(cid){
  const ds=iso(now);
  const arr0=(STATE.customTasks&&STATE.customTasks[ds])||[];
  const item=arr0.find(c=>c.id===cid);
  if(item&&item.origKey){ // 원래 다른 날짜의 항목이었다면 — 확인 후 그 자리로 되돌리기
    if(!confirm('이 항목을 원래 있던 날짜로 되돌릴까요?\n(오늘 목록에서는 사라져요)'))return;
    const arr=arr0.filter(c=>c.id!==cid);
    save({customTasks:{[ds]:arr},postponed:{[item.origKey]:false}});
  } else { // 직접 추가한 할 일 — 그냥 삭제
    const arr=arr0.filter(c=>c.id!==cid);
    save({customTasks:{[ds]:arr}});
  }
}

function renderGrid(){

  const nowWk=weekOf(now);

  const maxW=Math.max(...months.map(m=>W.filter(w=>w.m===m).length));
  let out='';
  months.forEach(m=>{
    const ws=W.filter(w=>w.m===m).map(w=>getWeek(w.n));
    let cells='';
    ws.forEach(w=>{
      const isNow=(nowWk&&nowWk.n===w.n), isSel=(openWeekNum===w.n);
      const cols=w.t.slice(0,2).map(k=>T[k][1]);
      const c=cols.length>1?`linear-gradient(135deg,${cols[0]},${cols[1]})`:cols[0];
      const dim=wkEnd(w)<now?'dim':'';
      const started=wkStart(w)<=now;
      const prog=weekProgress(w);
      const pctHTML=started?`<span class="pct ${prog.pct<40?'low':''}">${prog.pct}%</span>`:'';
      cells+=`<div class="cell ${isNow?'now':''} ${isSel?'sel':''} ${dim}" data-w="${w.n}" style="--c:${c}">
        ${w.ex||w.dot?`<span class="ex"></span>`:''}${w.warn?`<span class="wn"></span>`:''}${pctHTML}
        <span class="tip"><b>W${w.n} · ${fmt(w.s)}–${fmt(w.e)}</b><br>${esc(w.h.replace('★','').replace('⚠',''))}</span></div>`;
    });
    for(let i=ws.length;i<maxW;i++) cells+=`<div class="cell" style="background:transparent"></div>`;
    out+=`<div class="mrow"><div class="ml">${m}월</div><div class="cells">${cells}</div></div>`;
  });
  grid.innerHTML=out;
}

/* ===== 주간 리포트: 실제 체크 기록을 요약 텍스트로 ===== */
function weekReportText(wn){
  const w=getWeek(wn);
  if(!w||!w.n)return '';
  const lines=[],cat={},miss={};
  let totD=0,totT=0;
  let d=new Date(w.s+'T00:00:00');const end=new Date(w.e+'T00:00:00');
  while(d<=end){
    const ds=iso(d),dow=d.getDay();
    const items=buildDay(w,new Date(d)).map((it,i)=>Object.assign({},it,{_key:ds+'::i'+i}))
      .filter(it=>!(STATE.postponed&&STATE.postponed[it._key]));
    let dn=0;
    items.forEach(it=>{
      const key=(String(it.c).match(/--(\w+)/)||[])[1]||'etc';
      const label=(T[key]&&T[key][0])||key;
      if(!cat[label])cat[label]=[0,0];
      cat[label][1]++;
      if(STATE.checks&&STATE.checks[it._key]){dn++;cat[label][0]++;}
      else miss[it.tx]=(miss[it.tx]||0)+1;
    });
    totD+=dn;totT+=items.length;
    if(items.length)lines.push(DOW[dow]+' '+fmt(ds)+' '+dn+'/'+items.length);
    d.setDate(d.getDate()+1);
  }
  const pct=totT?Math.round(totD/totT*100):0;
  const catTxt=Object.keys(cat).map(k=>k+' '+cat[k][0]+'/'+cat[k][1]).join(' · ')||'-';
  const missTxt=Object.keys(miss).sort((a,b)=>miss[b]-miss[a]).slice(0,5)
    .map(k=>k+'('+miss[k]+'회)').join(' / ')||'없음';
  const nx=getWeek(wn+1);
  let nxTxt='';
  if(nx&&nx.n){

function applyPlanJSON(){
  const ta=document.querySelector('.w-import');
  if(!ta)return;
  let raw=(ta.value||'').trim();
  if(!raw){alert('붙여넣은 내용이 없어요.');return;}
  raw=raw.replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();
  const b1=raw.indexOf('{'),b2=raw.lastIndexOf('}');
  if(b1>=0&&b2>b1)raw=raw.slice(b1,b2+1);
  let o;
  try{o=JSON.parse(raw);}catch(e){alert('JSON을 읽지 못했어요.\n클로드가 준 { ... } 부분만 붙여넣어 주세요.');return;}
  /* 확장 포맷: {weeks:{}, flags:{}, days:{}} / 단순 포맷도 계속 지원 */
  const hasExt=o.weeks||o.flags||o.days;
  const src=hasExt?(o.weeks||{}):{};
  if(!hasExt){
    if(o.h||o.day||o.eve||o.wk)src[EDIT_N]=o;
    else Object.keys(o).forEach(k=>{if(/^[0-9]+$/.test(k))src[k]=o[k];});
  }
  const patch={},done=[];
  const wkKeys=Object.keys(src);
  if(wkKeys.length){
    const clean={};
    wkKeys.forEach(k=>{
      const base=W.find(x=>x.n===+k)||{},v=src[k]||{};
      clean[k]={h:v.h||base.h||'',day:v.day||base.day||'',eve:v.eve||base.eve||'',wk:v.wk||base.wk||''};
    });
    patch.weekOverrides=clean; done.push('주간계획 '+wkKeys.length+'개');
  }
  if(o.flags&&typeof o.flags==='object'){patch.weekFlags=o.flags; done.push('주간설정(운동·칼로리)');}
  if(o.goals&&typeof o.goals==='object'){
    const g={};
    Object.keys(o.goals).forEach(k=>{if(Array.isArray(o.goals[k]))g[k]=o.goals[k];});
    if(Object.keys(g).length){patch.goals=g; done.push('주간목표 교체 '+Object.keys(g).length+'개');}
  }
  if(o.addGoals&&typeof o.addGoals==='object'){
    const g={};
    Object.keys(o.addGoals).forEach(k=>{
      if(!Array.isArray(o.addGoals[k]))return;
      const cur=getGoals(+k).slice();
      o.addGoals[k].forEach(item=>{
        const nm=item.name||item.text||'';
        if(!nm)return;
        if(cur.some(x=>(x.name||x.text||'')===nm))return;  /* 중복 방지 */
        cur.push(item);
      });
      g[k]=cur;
    });
    if(Object.keys(g).length){patch.goals=Object.assign(patch.goals||{},g); done.push('공고·할일 추가');}
  }
  if(o.days&&typeof o.days==='object'){
    const dp={};
    Object.keys(o.days).forEach(ds=>{
      const arr=o.days[ds];
      if(Array.isArray(arr))dp[ds]=arr.map(x=>({tx:String(x.tx||''),c:String(x.c||'rest'),tm:x.tm||undefined,hot:x.hot?1:undefined}));
    });
    if(Object.keys(dp).length){patch.dayPlans=dp; done.push('일자별 일정 '+Object.keys(dp).length+'일');}
  }
  if(!done.length){alert('적용할 내용을 찾지 못했어요.');return;}
  save(patch);
  modalEl.classList.remove('open');
  alert('반영했어요! (' + done.join(' / ') + ')');
}

  const ws=e.target.closest('[data-act="wsave"]');
  if(ws){saveWordAndRefresh();return;}
  const ht=e.target.closest('[data-act="hantab"]');
  if(ht){openHanneungModal(ht.dataset.tab);return;}
  const hs=e.target.closest('[data-act="hansave"]');
  if(hs){saveHanMock();return;}
  const hd=e.target.closest('[data-act="handel"]');
  if(hd){delHanMock(hd.dataset.date);return;}
  const wg=e.target.closest('[data-act="wgsave"]');
  if(wg){saveWeightGoal();return;}
  const ms2=e.target.closest('[data-act="memosave"]');
  if(ms2){saveMemo(ms2.dataset.key);return;}
  const md2=e.target.closest('[data-act="memodel"]');
  if(md2){deleteMemo(md2.dataset.key);return;}
  const m=e.target.closest('[data-m]');
  if(m&&m.dataset.m==='wksave'){
    const q=c=>{const el=document.querySelector(c);return el?el.value.trim():'';};
    save({weekOverrides:{[EDIT_N]:{h:q('.w-h'),day:q('.w-day'),eve:q('.w-eve'),wk:q('.w-wk')}}});
    modalEl.classList.remove('open');return;
  }
  if(m&&m.dataset.m==='wkreset'){
    const b=W.find(x=>x.n===EDIT_N)||{};
    save({weekOverrides:{[EDIT_N]:{h:b.h||'',day:b.day||'',eve:b.eve||'',wk:b.wk||''}}});
    modalEl.classList.remove('open');return;
  }
  if(m){if(m.dataset.m==='save')save({goals:{[EDIT_N]:readModal()}});modalEl.classList.remove('open');return;}
  if(e.target===modalEl)modalEl.classList.remove('open');
};

function jobList(){
  const seen={},out=[];
  for(let n=1;n<=25;n++){
    getGoals(n).forEach(g=>{
      if(typeOf(g)!=='job')return;
      const name=g.name||g.job; if(!name||seen[name])return;
      seen[name]=true; out.push({name,imp:g.imp||3,due:g.due||'',week:n});
    });
  }
  return out.sort((a,b)=>(b.imp||0)-(a.imp||0));
}

function jvDaysLeft(ds){const p=ds.split('-').map(Number);const t=new Date(p[0],p[1]-1,p[2]);const n=new Date();const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.round((t-today)/86400000);}
function jvBadge(dl){
  const k=dl.kind;
  if(k==='rolling')return{text:'상시',color:'#a8adbe',tone:'flat'};
  if(k==='flexible')return{text:'수시',color:'#a8adbe',tone:'flat'};
  if(k==='unknown')return{text:'미정',color:'#b9bdca',tone:'flat'};
  if(k==='done')return{text:'완료',color:'#5bb08a',tone:'flat'};
  const n=jvDaysLeft(dl.date);
  if(n<0)return{text:'마감',color:'#b9bdca',tone:'flat'};
  if(n===0)return{text:'오늘 마감',color:'#e0637a',tone:'solid',pulse:true};
  if(n===1)return{text:'내일 마감',color:'#e0637a',tone:'solid',pulse:true};
  if(n<=3)return{text:'D-'+n,color:'#e0637a',tone:'solid',pulse:true};
  if(n<=7)return{text:'D-'+n,color:'#d59a3e',tone:'solid'};
  return{text:'D-'+n,color:'#8a95d6',tone:'flat'};
}
function jvSortKey(j){const k=j.deadline.kind;if(k==='date'){const n=jvDaysLeft(j.deadline.date);return n<0?9000+Math.abs(n):n;}if(k==='rolling')return 10001;if(k==='flexible')return 10002;if(k==='unknown')return 10003;return 20000;}
function jvStars(v){if(!v)return '<span style="color:var(--ink-faint)">—</span>';const f=Math.floor(v),h=v%1>=0.5;let s='';for(let i=0;i<f;i++)s+='★';if(h)s+='<span style="opacity:.45">★</span>';s+='<span style="color:#e3e5ee">'+'☆'.repeat(5-f-(h?1:0))+'</span>';return s;}
function jobStatus(j){const o=STATE.jobOverrides&&STATE.jobOverrides[j.id];return (o&&o.status)||j.status;}
function jobNote(j){const o=STATE.jobOverrides&&STATE.jobOverrides[j.id];return (o&&typeof o.note==='string')?o.note:j.note;}
function setJobOverride(id,patch){const cur=(STATE.jobOverrides&&STATE.jobOverrides[id])||{};save({jobOverrides:{[id]:Object.assign({},cur,patch)}});}
function jobsSummary(){
  const list=JOBS.map(j=>({...j,status:jobStatus(j)}));

  const applied=list.filter(j=>j.status==='지원완료').length;
  const writing=list.filter(j=>j.status==='작성중').length;
  const week=list.filter(j=>{const dl=j.deadline;if(dl.kind!=='date')return false;const n=jvDaysLeft(dl.date);return n>=0&&n<=7&&j.status!=='지원완료'&&j.status!=='제외';}).length;
  const top=list.filter(j=>j.stars===5).length;
  return {total,applied,writing,week,top};
}

function monthBudget(ym){const v=STATE.budget&&STATE.budget[ym];return (v!=null&&v!=='')?+v:null;}
function daysLeftInMonth(ym){
  const p=ym.split('-').map(Number);const t=new Date();
  const isCur=(t.getFullYear()===p[0]&&(t.getMonth()+1)===p[1]);
  const lastDay=new Date(p[0],p[1],0).getDate();
  if(isCur)return lastDay-t.getDate()+1;
  const firstYm=new Date(p[0],p[1]-1,1),firstCur=new Date(t.getFullYear(),t.getMonth(),1);
  return firstYm>firstCur?lastDay:0;
}
function manwon(n){/* 만원 단위 읽기 좋게 */const v=Math.round(n/10000);return v.toLocaleString()+'만원';}
function livingHTML(ym,income,expense){
  const bud=monthBudget(ym);
  const base=(bud!=null)?bud:income;      // 예산 있으면 예산, 없으면 이번 달 수입
  const usingBudget=(bud!=null);
  // 수입도 예산도 없으면 안내
  if(base<=0){
    return `<div class="lg-live empty"><div class="lab">이번 달 생활비</div><div class="big">아직 계산 전</div><div class="sub">월급(수입)을 등록하면 남은 생활비가 계산돼요.</div></div>`;
  }
  const left=base-expense;
  const dleft=daysLeftInMonth(ym);
  const perDay=(dleft>0&&left>0)?Math.floor(left/dleft):0;
  const spentPct=Math.min(100,Math.max(0,Math.round(expense/base*100)));
  let cls='',daily='';
  if(left<0)cls='over';
  else if(spentPct>=85)cls='warn';
  if(dleft>0&&left>0)daily=`· 하루 약 ${won(perDay)} 쓸 수 있어요`;
  const headline=left>=0
    ? `이번 달 생활비 <b>${manwon(left)}</b> 남았어요`
    : `이번 달 예산보다 <b>${manwon(-left)}</b> 더 썼어요`;
  return `<div class="lg-live ${cls}">
    <div class="lab">${usingBudget?'이번 달 생활비 (예산 기준)':'이번 달 생활비 (수입 기준)'}</div>
    <div class="big">${won(left)}</div>
    <div class="sub">${headline} ${daily}</div>
    <div class="pbar"><span style="width:${spentPct}%"></span></div>
    <div class="pmeta"><span>쓴 돈 ${won(expense)}</span><span>${usingBudget?'예산':'수입'} ${won(base)}</span></div>
  </div>`;
}

/* ===== 다이어트 (칼로리 추이) — 중립적 기록·시각화 ===== */
let DT_OPEN=false;
function calGoal(){
  const v=STATE.calGoal&&STATE.calGoal.goal;
  let base=(v!=null&&v!=='')?+v:1200;
  const cw=weekOf(now), f=cw?weekFlag(cw.n):{};
  if(f&&f.kcal)base=+f.kcal;
  return base;
}
function setCalGoal(n){save({calGoal:{goal:(n&&n>0)?n:''}});}
function dayIntake(ds){return ((STATE.foods&&STATE.foods[ds])||[]).reduce((a,b)=>a+(parseInt(b.c,10)||0),0);}
function dayBurn(ds){return ((STATE.exs&&STATE.exs[ds])||[]).reduce((a,b)=>a+(parseInt(b.c,10)||0),0);}
function dayNet(ds){return dayIntake(ds)-dayBurn(ds);}
function last7(){const out=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);const ds=iso(d);const logged=((STATE.foods&&STATE.foods[ds])||[]).length>0;out.push({ds,net:dayNet(ds),logged,dow:'일월화수목금토'[d.getDay()],today:i===0});}return out;}
function openDietView(){DT_OPEN=true;document.getElementById('dietView').classList.add('open');document.body.style.overflow='hidden';renderDietView();}
function closeDietView(){DT_OPEN=false;document.getElementById('dietView').classList.remove('open');document.body.style.overflow='';}
function renderDietView(){
  if(!DT_OPEN)return;
  const el=document.getElementById('dietView'); if(!el)return;
  const g=calGoal();
  const wk=last7();
  const ds=iso(now);
  const intake=dayIntake(ds),burn=dayBurn(ds),net=dayNet(ds);
  const logged=wk.filter(d=>d.logged);

function exerciseStats(){
  const all=STATE.exs||{};

  const entries=Object.entries(all).filter(([,arr])=>arr&&arr.length&&arr.some(x=>x.n||x.c));

/* ---- 자격증 진행도 (ADSP·SQLD·사무자동화) ---- */
function collectTrackItems(matchFn){
  const out=[];
  W.forEach(w=>{
    let d=new Date(w.s+'T00:00:00');const end=new Date(w.e+'T00:00:00');
    while(d<=end){
      const ds=iso(d);
      const items=buildDay(w,new Date(d));
      items.forEach((it,i)=>{
        if(it.exam)return;
        if(!matchFn(it))return;
        const key=ds+'::i'+i;
        if(STATE.postponed&&STATE.postponed[key])return;
        out.push({key,ds,tx:it.tx,done:!!(STATE.checks&&STATE.checks[key])});
      });
      d.setDate(d.getDate()+1);
    }
  });
  return out;
}
function trackStats(matchFn){
  const items=collectTrackItems(matchFn);
  return {done:items.filter(x=>x.done).length,total:items.length,items};
}

/* ================= Firebase ================= */
let db=null,F=null,stateRef=null,pendingWrites=0;
function setSync(st){
  if(st===true)st='on'; if(st===false)st='off';
  const s=document.getElementById('sync');
  const txt={on:'동기화됨',wait:'연결 중…',off:'로컬 모드'}[st]||'로컬 모드';
  s.className='sync '+st;
  document.getElementById('syncTxt').textContent=txt;
}
let renderTimer=null;
function scheduleRender(){
  if(renderTimer)return;
  renderTimer=requestAnimationFrame(()=>{renderTimer=null;renderAll();});
}
async function save(patch){
  deepMerge(STATE,patch);scheduleRender();
  if(db&&F&&stateRef){
    pendingWrites++;
    try{await F.setDoc(stateRef,patch,{merge:true});}
    catch(e){console.warn('저장 실패',e);}
    finally{pendingWrites--;}
  }
}
window.addEventListener('beforeunload',e=>{
  if(pendingWrites>0){e.preventDefault();e.returnValue='';}
});
async function initFirebase(){
  try{
    setSync('wait');
    // 두 모듈을 동시에 받아옴 (순서대로 기다리지 않음)
    const [appMod,fs]=await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js")
    ]);
    const app=appMod.initializeApp(firebaseConfig);
    // 오프라인 캐시를 '초기화 옵션'으로 켬 — 기다리지 않으므로 구독이 즉시 시작됨
    try{
      db=fs.initializeFirestore(app,{localCache:fs.persistentLocalCache({tabManager:fs.persistentMultipleTabManager()})});
    }catch(e){
      console.warn('영속 캐시 사용 불가, 기본 모드로 진행:',e);
      db=fs.getFirestore(app);
    }
    F=fs;
    stateRef=fs.doc(db,'roadmap','state');
    fs.onSnapshot(stateRef,snap=>{
      // 내가 방금 저장해서 되돌아온 스냅샷(에코)이면 화면은 이미 최신이라 다시 안 그림
      const isLocalEcho=snap.metadata.hasPendingWrites;
      const d=snap.exists()?snap.data():{};
      STATE={checks:d.checks||{},customTasks:d.customTasks||{},goals:d.goals||{},kcal:d.kcal||{},weight:d.weight||{},foods:d.foods||{},exs:d.exs||{},postponed:d.postponed||{},applied:d.applied||{},jlptWords:d.jlptWords||{},hanneungMock:d.hanneungMock||{},weightGoal:d.weightGoal||{},memos:d.memos||{},skipped:d.skipped||{},jobOverrides:d.jobOverrides||{},ledger:d.ledger||{},calGoal:d.calGoal||{},budget:d.budget||{},weekOverrides:d.weekOverrides||{},dayPlans:d.dayPlans||{},weekFlags:d.weekFlags||{}};
      setSync(snap.metadata.fromCache?'wait':'on');
      if(!isLocalEcho)scheduleRender();  // 외부(다른 기기)에서 온 변경일 때만 렌더
    },err=>{console.warn('구독 오류',err);setSync('off');});
  }catch(e){console.warn('Firebase 미연결(로컬 모드):',e);setSync('off');}
}

renderAll();
initFirebase();
</script>
</body>
</html>
